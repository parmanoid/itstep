<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IT STEP — Unofficial</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="nav-link active">Главная</a>
        <a href="page1.html" class="nav-link">Stylophone</a>
    </nav>

    <main class="content">
        <header class="hero">
            <h1>ITStep Academy</h1>
            <p class="subtitle">unofficial · by parmanoid</p>
        </header>

        <div class="media-box">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQvvIYmsaPdjMFeoYdzzni8-Vg5b_IRVNm_4hLWdhjBWUEQ2WmHUlupqqE&s=10" alt="Content image" />
        </div>

        <p class="disclaimer">Соблюдайте цензуру в чате. Администрация не несёт ответственности за сообщения участников.</p>

        <div class="upload-zone">
            <label class="file-label">
                <input type="file" id="imageFile" accept="image/*" />
                <span>Выбрать изображение</span>
            </label>
            <button onclick="uploadToImgBB()" class="btn-primary">Загрузить на ImgBB</button>
            <div id="status"></div>
        </div>

        <div class="comments-wrapper">
            <script src="https://giscus.app/client.js"
                    data-repo="parmanoid/comments"
                    data-repo-id="R_kgDOTS1egA"
                    data-category="General"
                    data-category-id="DIC_kwDOTS1egM4DA0E8"
                    data-mapping="pathname"
                    data-strict="0"
                    data-reactions-enabled="1"
                    data-emit-metadata="0"
                    data-input-position="top"
                    data-theme="dark"
                    data-lang="ru"
                    crossorigin="anonymous"
                    async>
            </script>
        </div>
    </main>

    <script>
        function updateFileName() {
            const input = document.getElementById('imageFile');
            const labelText = document.querySelector('.file-label span');
            if (input.files.length > 0) {
                labelText.textContent = input.files[0].name;
                labelText.style.color = '#ff4d73';
                labelText.style.fontWeight = '500';
            } else {
                labelText.textContent = 'Выбрать изображение';
                labelText.style.color = '#d0d0dc';
                labelText.style.fontWeight = '500';
            }
        }

        async function uploadToImgBB() {
            const fileInput = document.getElementById('imageFile');
            const statusDiv = document.getElementById('status');

            if (!fileInput.files.length) {
                statusDiv.innerHTML = `<p class="status-msg error">Файл не выбран</p>`;
                return;
            }

            statusDiv.innerHTML = `<p class="status-msg loading">Загрузка...</p>`;
            const formData = new FormData();
            formData.append('image', fileInput.files[0]);

            try {
                const response = await fetch('https://api.imgbb.com/1/upload?key=120a27bcbb28d3ffd9f03bc4b32bb54f', {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();

                if (result.success) {
                    statusDiv.innerHTML = `
                        <p class="status-msg success">Кликните, чтобы скопировать Markdown:</p>
                        <input type="text" class="url-output" value="![image](${result.data.url})" readonly onclick="this.select(); navigator.clipboard?.writeText(this.value);" />
                    `;
                } else {
                    statusDiv.innerHTML = `<p class="status-msg error">Ошибка ImgBB</p>`;
                }
            } catch (err) {
                statusDiv.innerHTML = `<p class="status-msg error">Ошибка сети</p>`;
                console.error(err);
            }
        }

        document.getElementById('imageFile').addEventListener('change', updateFileName);
    </script>
</body>
</html>
