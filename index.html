    <script>
    async function uploadToImgBB() {
        const fileInput = document.getElementById('imageFile');
        const statusDiv = document.getElementById('status');
        
        if (!fileInput.files.length) {
            statusDiv.innerHTML = "<p>Выбери файл!</p>";
            return;
        }

        statusDiv.innerHTML = "<p>Загрузка...</p>";
        const formData = new FormData();
        formData.append("image", fileInput.files[0]);

        try {
            const response = await fetch("https://api.imgbb.com/1/upload?key=120a27bcbb28d3ffd9f03bc4b32bb54f", {
                method: "POST",
                body: formData
            });
            const result = await response.json();

            if (result.success) {
                statusDiv.innerHTML = `
                    <p>Скопируй этот код в поле ввода ниже:</p>
                    <input type="text" class="url-output" value="![image](${result.data.url})" readonly onclick="this.select()">
                `;
            } else {
                statusDiv.innerHTML = "<p>Ошибка ImgBB.</p>";
            }
        } catch (err) {
            statusDiv.innerHTML = "<p>Ошибка сети.</p>";
            console.error(err);
        }
    }
    </script>
