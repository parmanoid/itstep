    <!-- Скрипт ImgBB -->
    <script>
    async function uploadToImgBB() {
        const fileInput = document.getElementById('imageFile');
        const statusDiv = document.getElementById('status');
        
        if (fileInput.files.length === 0) {
            statusDiv.innerHTML = "Выбери файл!";
            return;
        }

        statusDiv.innerHTML = "Загрузка...";
        
        const formData = new FormData();
        formData.append("image", fileInput.files[0]);

        // Вставь сюда свой API ключ ImgBB
        const apiKey = "120a27bcbb28d3ffd9f03bc4b32bb54f"; 

        try {
            const response = await fetch(`https://api.imgbb.com/1/upload?key=${apiKey}`, {
                method: "POST",
                body: formData
            });
            const result = await response.json();

            if (result.success) {
                const imgUrl = result.data.url;
                statusDiv.innerHTML = `
                    <p>Скопируй этот код в поле ввода ниже:</p>
                    <input type="text" value="![image](${imgUrl})" readonly onclick="this.select()">
                `;
            } else {

            console.error(err);
        }
    }
