<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Minecraft Mods — IT STEP</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <nav class="navbar">
        <a href="https://parmanoid.github.io/itstep/" class="nav-link">Home</a>
        <a href="page1.html" class="nav-link">Stylophone</a>
        <a href="page2.html" class="nav-link active">Minecraft Mods</a>
    </nav>

    <main class="content">
        <header class="hero">
            <h1 class="large-title">Minecraft Mods 📦</h1>
            <p class="subtitle">Upload your mods and share links in the comments!</p>
        </header>

        <div class="upload-zone">
            <label class="file-label">
                <input type="file" id="modFile" accept=".jar,.zip,.rar,.7z" />
                <span id="fileLabelText">Choose mod file (.jar, .zip, .rar)</span>
            </label>
            <button onclick="uploadMod()" class="btn-primary">Upload to Gofile</button>
            <div id="status"></div>
            
            <p style="color: var(--text-muted); font-size: 0.75rem; margin-top: 0.5rem;">
                Files up to 100MB · Hosted on Gofile.io
            </p>
        </div>

        <div class="comments-wrapper">
            <script src="https://giscus.app/client.js"
                    data-repo="parmanoid/comments"
                    data-repo-id="R_kgDOTS1egA"
                    data-category="General"
                    data-category-id="DIC_kwDOTS1egM4DA0E8"
                    data-mapping="pathname"
                    data-strict="0"
                    data-reactions-enabled="1"
                    data-emit-metadata="0"
                    data-input-position="top"
                    data-theme="dark"
                    data-lang="en"
                    crossorigin="anonymous"
                    async>
            </script>
        </div>
    </main>

    <script>
        document.getElementById('modFile').addEventListener('change', function() {
            const labelText = document.getElementById('fileLabelText');
            if (this.files.length > 0) {
                labelText.textContent = this.files[0].name + ' (' + (this.files[0].size / 1024 / 1024).toFixed(1) + ' MB)';
                labelText.classList.add('file-selected');
            } else {
                labelText.textContent = 'Choose mod file (.jar, .zip, .rar)';
                labelText.classList.remove('file-selected');
            }
        });

        async function uploadMod() {
            const fileInput = document.getElementById('modFile');
            const statusDiv = document.getElementById('status');

            if (!fileInput.files.length) {
                statusDiv.innerHTML = `<p class="status-msg error">⚠️ No file selected</p>`;
                return;
            }

            const file = fileInput.files[0];
            
            // Проверка размера (100MB лимит Gofile)
            if (file.size > 100 * 1024 * 1024) {
                statusDiv.innerHTML = `<p class="status-msg error">⚠️ File too large (max 100MB)</p>`;
                return;
            }

            statusDiv.innerHTML = `<p class="status-msg loading">⏳ Uploading to Gofile...</p>`;

            try {
                // 1. Получаем сервер для загрузки
                const serverRes = await fetch('https://api.gofile.io/servers');
                const serverData = await serverRes.json();
                
                if (!serverData.status || serverData.status !== 'ok') {
                    throw new Error('Failed to get upload server');
                }

                const server = serverData.data.servers[0];
                
                // 2. Загружаем файл
                const formData = new FormData();
                formData.append('file', file);

                const uploadRes = await fetch(`https://${server}.gofile.io/uploadFile`, {
                    method: 'POST',
                    body: formData
                });

                const uploadData = await uploadRes.json();

                if (uploadData.status === 'ok' && uploadData.data.downloadPage) {
                    const downloadUrl = uploadData.data.downloadPage;
                    const directUrl = uploadData.data.directLink || uploadData.data.downloadPage;
                    
                    statusDiv.innerHTML = `
                        <p class="status-msg success">✅ Upload complete!</p>
                        <input type="text" class="url-output" value="${directUrl}" readonly onclick="this.select(); navigator.clipboard?.writeText(this.value);" />
                        <p style="color: var(--text-muted); font-size: 0.75rem; margin-top: 0.3rem;">
                            📋 Click to copy · Share the link in the comments below
                        </p>
                    `;
                } else {
                    statusDiv.innerHTML = `<p class="status-msg error">❌ Upload failed. Please try again.</p>`;
                }
            } catch (err) {
                console.error('Upload error:', err);
                statusDiv.innerHTML = `
                    <p class="status-msg error">❌ Upload error: ${err.message || 'Network issue'}</p>
                    <p style="color: var(--text-muted); font-size: 0.75rem; margin-top: 0.3rem;">
                        💡 You can also upload manually at <a href="https://gofile.io" target="_blank" style="color: var(--accent-purple);">gofile.io</a>
                    </p>
                `;
            }
        }
    </script>
</body>
</html>
