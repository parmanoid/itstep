<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Minecraft Mods — IT STEP</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <nav class="navbar">
        <a href="https://parmanoid.github.io/itstep/" class="nav-link">Home</a>
        <a href="page1.html" class="nav-link">Stylophone</a>
        <a href="page2.html" class="nav-link active">Minecraft Mods</a>
    </nav>

    <main class="content">
        <header class="hero">
            <h1 class="large-title">Minecraft Mods 📦</h1>
            <p class="subtitle">Upload your mods and share links in the comments!</p>
        </header>

        <div class="upload-zone">
            <label class="file-label">
                <input type="file" id="modFile" accept=".jar,.zip,.rar" />
                <span id="fileLabelText">Choose mod file (.jar, .zip)</span>
            </label>
            <button onclick="uploadMod()" class="btn-primary">Upload Mod</button>
            <div id="status"></div>
        </div>

        <div class="comments-wrapper">
            <script src="https://giscus.app/client.js"
                    data-repo="parmanoid/comments"
                    data-repo-id="R_kgDOTS1egA"
                    data-category="General"
                    data-category-id="DIC_kwDOTS1egM4DA0E8"
                    data-mapping="pathname"
                    data-strict="0"
                    data-reactions-enabled="1"
                    data-emit-metadata="0"
                    data-input-position="top"
                    data-theme="dark"
                    data-lang="en"
                    crossorigin="anonymous"
                    async>
            </script>
        </div>
    </main>

    <script>
        document.getElementById('modFile').addEventListener('change', function() {
            const labelText = document.getElementById('fileLabelText');
            if (this.files.length > 0) {
                labelText.textContent = this.files[0].name;
                labelText.classList.add('file-selected');
            } else {
                labelText.textContent = 'Choose mod file (.jar, .zip)';
                labelText.classList.remove('file-selected');
            }
        });

        async function uploadMod() {
            const fileInput = document.getElementById('modFile');
            const statusDiv = document.getElementById('status');

            if (!fileInput.files.length) {
                statusDiv.innerHTML = `<p class="status-msg error">No file selected</p>`;
                return;
            }

            statusDiv.innerHTML = `<p class="status-msg loading">Uploading mod to host...</p>`;
            
            const formData = new FormData();
            formData.append('reqtype', 'fileupload');
            formData.append('fileToUpload', fileInput.files[0]);

            try {
                // Альтернативный способ загрузки без CORS-прокси
                // Используем прямой запрос через iframe или другой сервис
                
                // Вариант 1: Используем другой прокси, который поддерживает multipart
                const proxyUrl = 'https://api.allorigins.win/raw?url=';
                const targetUrl = 'https://catbox.moe/user/api.php';
                
                // Для catbox используем прямой запрос с form-data (работает в современных браузерах)
                const response = await fetch(targetUrl, {
                    method: 'POST',
                    body: formData,
                    mode: 'no-cors' // Пытаемся отправить без CORS
                });

                // При mode: 'no-cors' мы не можем прочитать ответ
                // Поэтому используем альтернативный подход
                throw new Error('Catbox требует CORS-прокси, но corsproxy.io не поддерживает файлы');
                
            } catch (err) {
                // Если не работает - пробуем через другой прокси
                try {
                    statusDiv.innerHTML = `<p class="status-msg loading">Trying alternative method...</p>`;
                    
                    // Используем другой прокси-сервис
                    const formData2 = new FormData();
                    formData2.append('file', fileInput.files[0]);
                    
                    const response2 = await fetch('https://cors-anywhere.herokuapp.com/https://catbox.moe/user/api.php', {
                        method: 'POST',
                        body: formData2
                    });
                    
                    if (response2.ok) {
                        const fileUrl = await response2.text();
                        statusDiv.innerHTML = `
                            <p class="status-msg success">Done! Copy link & paste to comments:</p>
                            <input type="text" class="url-output" value="${fileUrl.trim()}" readonly onclick="this.select(); navigator.clipboard?.writeText(this.value);" />
                        `;
                    } else {
                        statusDiv.innerHTML = `<p class="status-msg error">Upload failed. Try using direct upload link: <a href="https://catbox.moe/" target="_blank">catbox.moe</a></p>`;
                    }
                } catch (err2) {
                    statusDiv.innerHTML = `
                        <p class="status-msg error">Upload failed. Please use alternative:</p>
                        <p style="font-size: 0.8rem; color: var(--text-secondary); margin-top: 0.5rem;">
                            1. Go to <a href="https://catbox.moe/" target="_blank" style="color: var(--accent-purple);">catbox.moe</a><br>
                            2. Upload your .jar file<br>
                            3. Copy the link and paste it in the comments
                        </p>
                    `;
                    console.error(err2);
                }
            }
        }
    </script>
</body>
</html>
