<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Minecraft Mods — IT STEP</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <nav class="navbar">
        <a href="https://parmanoid.github.io/itstep/" class="nav-link">Home</a>
        <a href="page1.html" class="nav-link">Stylophone</a>
        <a href="page2.html" class="nav-link active">Minecraft Mods</a>
    </nav>

    <main class="content">
        <header class="hero">
            <h1 class="large-title">Minecraft Mods 📦</h1>
            <p class="subtitle">Upload your mods and share links in the comments!</p>
        </header>

        <div class="upload-zone">
            <p style="color: var(--text-secondary); margin-bottom: 1rem; font-size: 0.9rem;">
                Upload your mod to Catbox and get a direct link:
            </p>
            
            <!-- Прямая загрузка через iframe -->
            <iframe src="https://catbox.moe/" 
                    style="width: 100%; height: 400px; border: 1px solid var(--border-subtle); border-radius: var(--radius-sm); background: var(--bg-primary);">
            </iframe>
            
            <p style="color: var(--text-muted); font-size: 0.8rem; margin-top: 0.5rem;">
                1. Upload your file on Catbox<br>
                2. Copy the link it gives you<br>
                3. Paste it in the comments below
            </p>
        </div>

        <div class="comments-wrapper">
            <script src="https://giscus.app/client.js"
                    data-repo="parmanoid/comments"
                    data-repo-id="R_kgDOTS1egA"
                    data-category="General"
                    data-category-id="DIC_kwDOTS1egM4DA0E8"
                    data-mapping="pathname"
                    data-strict="0"
                    data-reactions-enabled="1"
                    data-emit-metadata="0"
                    data-input-position="top"
                    data-theme="dark"
                    data-lang="en"
                    crossorigin="anonymous"
                    async>
            </script>
        </div>
    </main>
</body>
</html>
